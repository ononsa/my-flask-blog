<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>私のブログ</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>{{ title }}</h1>

    {% for post in posts %}
        <div style="border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; border-radius: 5px;">
            <h2>{{ post.title }}</h2>
            <small>{{ post.date }}</small>
            <p>{{ post.content }}</p>
        </div>
    {% endfor %}
</body>
</html>
